<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flexbox Navbar</title>
    <style>
      /* Navbar container */
      .navbar {
        display: flex;
        justify-content: space-between; /* logo left, links right */
        align-items: center;
        background: rgb(7, 170, 108);
        padding: 10px 20px;
      }

      /* Logo styling */
      .logo {
        font-size: 20px;
        font-weight: bold;
        color: white;
      }

      /* Navigation links */
      nav ul {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
        gap: 15px; /* space between links */
      }

      nav a {
        text-decoration: none;
        color: white;
        font-weight: bold;
      }

      nav a:hover {
        text-decoration: underline;
      }

      /* Responsive design for small screens */
      @media (max-width: 600px) {
        .navbar {
          flex-direction: column; /* stack items vertically */
          align-items: flex-start;
        }

        nav ul {
          flex-direction: column;
          width: 100%;
        }

        nav li {
          width: 100%;
        }

        nav a {
          display: block;
          padding: 10px;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="logo">LNCT Bhopal</div>
        <nav>
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Courses</a></li>
            <li><a href="#">Facilities</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>
  </body>
</html>
