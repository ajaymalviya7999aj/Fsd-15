<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        position: relative;
        width: 400px;
        height: 400px;
      }
      .img1 {
        position: absolute;
        top: 20px;
        left: 8px;
        z-index: -100;
      }
      .img2 {
        position: absolute;
        top: 50px;
        left: 30px;
        z-index: 50;
      }
      .img3 {
        position: absolute;
        top: 80px;
        left: 70px;
        z-index: 50;
      }
      .img4 {
        position: absolute;
        top: 120px;
        left: 100px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        class="img1"
        height
        100px
        width="150px"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScD_Uo3n1OusGmgkLrrBMmkKqXA6gmjkuB6Q&s"
      />
      <img
        class="img2"
        height
        100px
        width="150px"
        src="https://www.shutterstock.com/image-photo/serenity-summer-day-durmitor-national-600nw-2623341111.jpg"
      />
      <img
        class="img3"
        height
        100px
        width="150px"
        src="https://i.pinimg.com/originals/9c/b0/70/9cb070d62dc738a0c3a1a408d68e4af5.jpg"
      />
      <img
        class="img4"
        height
        150px
        width="200px"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhII9ud_FgzMMlnWwk3-0sB_lEM6aUgipcBg&s"
      />
    </div>
  </body>
</html>
