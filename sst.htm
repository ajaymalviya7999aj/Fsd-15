<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: blueviolet;
        height: 500vh;
      }
      .main {
        background-color: beige;
        height: 500px;
        width: 1000px;
      }

      .box1 {
        height: 100px;
        width: 100px;
        background-color: aqua;
        margin-left: 50px;
        padding-right: 20px;
        position: sticky;
        top: 0;
      }
      .box2 {
        height: 100px;
        width: 100px;
        background-color: red;
        position: fixed;
      }
    </style>
  </head>
  <body>
    <div class="box1">sticky</div>
    <div class="box2">fixed</div>
    <div class="main">content</div>
  </body>
</html>
