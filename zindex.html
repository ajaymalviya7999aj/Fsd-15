<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      div {
        height: 150px;
        width: 150px;
        border: 1px black solid;
      }
      .box1 {
        position: absolute;
        background-color: red;
        top: 60px;
        left: 15px;
        z-index: -100px;
      }
      .box2 {
        position: absolute;
        background-color: blue;
        top: 80px;
        left: 40px;
        bottom: 50px;
        z-index: -50px;
        /*display: none;*/
        /*visibility: hidden;*/
      }
      .box3 {
        position: absolute;
        background-color: green;
        top: 100px;
        bottom: 70px;
        left: 60px;
        z-index: 50px;
      }
      .box4 {
        position: absolute;
        background-color: yellow;
        top: 120px;
        bottom: 90px;
        left: 80px;
        z-index: 100px;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
  </body>
</html>
